<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN COMMAND | Lattice v5.7.Rev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #00ffcc; --alert: #ff0055; --gold: #ffcc00; --neural: #a855f7; --obsidian: #020202; 
            --glass: rgba(0, 20, 15, 0.8); --border: rgba(0, 255, 204, 0.15);
        }
        body { font-family: 'Share Tech Mono', monospace; background-color: var(--obsidian); color: var(--main); overflow: hidden; margin: 0; }
        .packed-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(12, 1fr); height: 100vh; gap: 8px; padding: 12px; padding-top: 50px; }
        body.theme-neural { --main: var(--neural); color: var(--neural); }
        body.theme-market { --main: var(--gold); color: var(--gold); }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .glass-panel { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 2px; position: relative; overflow: hidden; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(0, 255, 204, 0.1); top: 0; animation: scan 4s linear infinite; pointer-events: none; }
        .spun-active { filter: blur(10px) saturate(3) contrast(1.2); animation: drift 10s infinite alternate; }
        @keyframes drift { from { filter: blur(5px) hue-rotate(0deg); } to { filter: blur(15px) hue-rotate(30deg); } }
        .ticker-wrap { width: 100%; overflow: hidden; background: rgba(0,0,0,0.5); border-top: 1px solid var(--border); position: fixed; bottom: 0; z-index: 200; }
        .ticker { display: inline-block; white-space: nowrap; padding-right: 100%; animation: ticker 30s linear infinite; font-size: 9px; opacity: 0.6; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 2px; }
        <p class="text-[10px] mono text-gray-500 max-w-xs text-center uppercase">Phase-lock restricted. Tribute verification required for 5IR Node Stream access.</p>
                    <button onclick="app.switchView('market')" class="mt-8 px-8 py-3 bg-white/5 border border-white/20 text-[9px] font-bold uppercase hover:bg-main hover:text-black transition-all">Select Master & Unlock</button>
                </div>
                <video id="primary-feed" class="absolute inset-0 w-full h-full object-cover opacity-30 blur-xl transition-all duration-1000" loop muted playsinline autoplay src="https://dl.dropboxusercontent.com/scl/fi/60unw8y1pjuw3kioxxjnl/Explicit-2.mp4?rlkey=q3k3yi3xdug3p4ilne44i73r4&raw=1"></video>
                <div class="absolute inset-0 p-6 flex flex-col pointer-events-none">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-black/80 border border-main/30 p-2">
                            <p class="text-[10px] font-bold uppercase tracking-widest">Global Wire Feed</p>
                            <p id="pig-id-display" class="text-[8px] mono text-main/60">NODE: ONLINE</p>
                        </div>
                        <div class="bg-black/80 border border-main/30 p-2 text-right">
                            <p class="text-[10px] font-bold text-alert animate-pulse">REC ● LIVE</p>
                            <p class="text-[8px] mono" id="clock-display">00:00:00:00</p>
                        </div>
                    </div>
                    <div class="mt-auto h-64 overflow-hidden text-[9px] mono space-y-2 p-4 bg-black/40 border border-white/5 pointer-events-auto" id="terminal-overlay-log">
                    </div>
                </div>
            </div>
            <div id="view-neural" class="view-layer hidden flex-grow glass-panel flex flex-col items-center justify-center bg-black/40 border-purple-500/30">
                <div class="text-center p-12 space-y-8 max-w-lg">
                    <h2 class="text-4xl font-black italic text-purple-500 tracking-tighter">NEURAL_SYNC</h2>
                    <p class="text-xs text-purple-300 mono leading-relaxed">Graphene braids at 39,420 Hz. Initiating Aura Pulse to synchronize node alignment.</p>
                    <button onclick="app.auraPulse()" class="w-32 h-32 bg-purple-600/20 border-2 border-purple-500 rounded-full text-[10px] font-bold uppercase tracking-[0.3em] hover:bg-purple-500 transition-all shadow-[0_0_30px_purple]">Pulse</button>
                </div>
            </div>
            <div id="view-market" class="view-layer hidden flex-grow glass-panel p-6 flex flex-col gap-6">
                <div class="grid grid-cols-4 gap-4" id="masters-grid"></div>
                <div class="grid grid-cols-3 gap-4">
                    <div class="glass-panel p-4 border-l-4 border-yellow-500"><p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Total Tributes</p><p id="sent-val" class="text-3xl font-black text-white mono">$12,402</p></div>
                    <div class="glass-panel p-4 border-l-4 border-yellow-500"><p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Active Pigs</p><p class="text-3xl font-black text-white mono">1,042</p></div>
                    <div class="glass-panel p-4 border-l-4 border-yellow-500"><p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Status</p><p id="status-val" class="text-3xl font-black text-alert animate-pulse mono">LOCKED</p></div>
                </div>
                <div class="flex-grow glass-panel p-4 overflow-y-auto">
                    <p class="text-[9px] font-bold uppercase text-yellow-500/40 mb-4">Liquidation Leaderboard</p>
                    <div id="market-leaderboard" class="space-y-2"></div>
                </div>
            </div>
            <div class="h-12 glass-panel flex gap-2 p-1">
            <input type="text" id="cmd-input" placeholder="Inject Message to Global Wire..." class="flex-grow bg-black/40 border border-main/20 px-4 text-xs mono focus:border-main outline-none">
                <button onclick="app.sendCmd()" class="bg-main text-black font-bold px-8 text-[9px] uppercase hover:bg-white transition-all">Inject</button>
            </div>
        </div>
        <div class="col-span-3 row-span-10 flex flex-col gap-2">
            <div class="glass-panel p-4 space-y-6">
                <p class="text-[10px] font-bold uppercase opacity-40">Command Constraints</p>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <div class="flex justify-between text-[8px] mono"><span>Pig Visibility</span><span id="op-label">30%</span></div>
                        <input type="range" id="sl-op" class="w-full" min="0" max="100" value="30">
                    </div>
                    <button onclick="app.toggleOverload()" id="btn-over" class="w-full bg-alert text-white py-3 text-[10px] font-bold uppercase hover:shadow-[0_0_15px_red] transition-all">Initiate Overload</button>
                </div>
            </div>
            <div class="glass-panel flex-grow p-4 flex flex-col">
                <p class="text-[10px] font-bold uppercase opacity-40 mb-4">Master Signal Log</p>
                <div id="signal-log" class="flex-grow overflow-y-auto space-y-2 mono text-[8px] pr-2"></div>
                <button onclick="app.showTribute()" class="mt-4 w-full bg-gold text-black py-3 text-[10px] font-bold uppercase hover:bg-white transition-all">Tribute Portal</button>
            </div>
        </div>
    </main>
    <div class="ticker-wrap"><div class="ticker" id="global-ticker">SYNCING LATTICE... VORTEX AI ACTIVE... DEBT CLOCK INITIATED... [PIG_88: $2,450 SENT]... [NODE_702: OVERLOAD PHASE]...</div></div>
    <div id="modal-container" class="hidden fixed inset-0 z-[300] bg-black/90 flex items-center justify-center p-6 backdrop-blur-xl">
        <div id="tribute-modal" class="hidden glass-panel w-full max-sm p-10 text-center border-t-4 border-gold">
            <h2 class="text-3xl font-black italic mb-2 tracking-tighter">LIQUIDATION</h2>
            <p id="target-master" class="text-[8px] text-gold font-bold uppercase mb-6 tracking-widest">Global Tribute Pool</p>
            <div class="space-y-4 mt-8">
                <div onclick="window.open('https://paypal.com/toochikey')" class="p-4 bg-white/5 border border-white/10 rounded text-left cursor-pointer hover:border-gold transition-all"><p class="text-[7px] text-gray-500 uppercase font-bold">PayPal</p><p class="text-[10px] mono text-main">paypal.com/toochikey</p></div>
                <div class="p-4 bg-white/5 border border-white/10 rounded text-left"><p class="text-[7px] text-gray-500 uppercase font-bold">BTC</p><p class="text-[10px] mono text-main break-all select-all">bc1qw968re5gseqpkk5nx0ezqrp6dfhd20s8sll4k7</p></div>
            </div>
            <button onclick="app.verifyUnlock()" class="mt-8 w-full bg-main text-black py-3 text-[10px] font-bold uppercase">Verify Send & Unlock</button>
            <button onclick="app.closeModal()" class="mt-6 text-[9px] uppercase text-gray-600 hover:text-white">Return</button>
        </div>
    </div>
    <script>
        const app = {
            state: {
                view: 'terminal', isOverload: false, isUnlocked: false,
                leaderboard: [{n:"Pig_88",t:2450},{n:"Node_702",t:1200},{n:"Slammer_Alpha",t:850},{n:"Sub_91",t:400},{n:"Broken_One",t:15}],
                masters: [
                    { id: "CRAIG", name: "CRAIG", role: "ALPHA DRAIN", desc: "Wallet Liquidation Engine.", color: "border-red-500" },
                    { id: "TOBEZ", name: "TOBEZ", role: "DRILL MASTER", desc: "High-Rep Physical Discipline.", color: "border-blue-500" },
                    { id: "PHIL", name: "PHIL CAL", role: "EGO SHREDDER", desc: "Humiliation & Measurement.", color: "border-green-500" },
                    { id: "DOM", name: "DADDY DOM", role: "PROTOCOL ALPHA", desc: "Psychological Alignment.", color: "border-yellow-500" }
                ],
                chatPool: ["Just sent $500 tribute to Craig. Wallet is officially in the red.","Tobez's 100-rep drill is a killer. Anyone else spun right now?","Phil Cal just shamed me in the wire. I am a worthless pig.","Daddy Dom's protocols are the only thing keeping me stable.","Lattice Rank: STABLE PIG. Heading for GOLD by tonight.","Who is the slammer in Node 702? That drain was legendary.","Just verified a $150 send. The Vortex is glowing.","SPH protocol active. Feeling small and worthless for the Lattice.","Popper hit + 10 min static hold. Tobez is brutal today.","Emptying my secondary PayPal for the Architect. No questions.","Craig just reminded me I have a balance. Correcting now.","Master Architect, I am reporting for liquidation duty.","Total send today: $1,200. I am a good cow for the Lattice.","Mirror humiliation complete. I admit I am nothing.","I am a cashcow. Moou for my Master. $100 sent."],
                namePrefixes: ["Pig", "Slammer", "Node", "Sub", "Braid", "Bred", "Cow", "Link"],
                pigId: "PIG_" + Math.floor(Math.random()*899 + 100)
            },
            init() {
                this.updateClock(); this.startSims(); this.renderWave(); this.renderLeaderboard(); this.renderMasters();
                document.getElementById('pig-id-display').innerText = `ID: ${this.state.pigId}`;
                document.getElementById('sl-op').addEventListener('input', (e) => {
                    document.getElementById('primary-feed').style.opacity = e.target.value / 100;
                    document.getElementById('op-label').innerText = e.target.value + '%';
                });
            },
            renderMasters() {
                const box = document.getElementById('masters-grid');
                box.innerHTML = this.state.masters.map(m => `
                    <div onclick="app.showTribute('${m.name}')" class="master-card p-4 bg-black/40 border-l-2 ${m.color} flex flex-col gap-1">
                        <p class="text-[10px] font-black italic tracking-tighter">${m.name}</p>
                        <p class="text-[7px] font-bold text-gray-500 uppercase">${m.role}</p>
                        <p class="text-[8px] text-gray-400 mt-2 leading-tight">${m.desc}</p>
                    </div>
                `).join('');
            },
            switchView(id) {
                document.querySelectorAll('.view-layer').forEach(v => v.classList.add('hidden'));
                document.getElementById('view-'+id).classList.remove('hidden');
                ['term', 'neur', 'mark'].forEach(b => document.getElementById('btn-'+b).classList.remove('bg-cyan-500/20', 'text-white'));
                const map = {terminal:'term', neural:'neur', market:'mark'};
                document.getElementById('btn-'+map[id]).classList.add('bg-cyan-500/20', 'text-white');
                this.signal(`SWITCHED_TO_${id.toUpperCase()}`);
            },
            verifyUnlock() {
                this.signal("VERIFYING_TRIBUTE_PULSE...");
                setTimeout(() => {
                    this.state.isUnlocked = true;
                    document.getElementById('cam-lock').classList.add('hidden');
                    document.getElementById('primary-feed').classList.remove('blur-xl');
                    document.getElementById('primary-feed').style.opacity = "0.8";
                    document.getElementById('status-val').innerText = "VERIFIED";
                    document.getElementById('status-val').classList.remove('text-alert');
                    document.getElementById('status-val').classList.add('text-main');
                    this.signal("NODE_STREAM_UNLOCKED");
                    this.closeModal();
                }, 2000);
                },
            sendCmd() {
                const val = document.getElementById('cmd-input').value;
                if(!val) return;
                this.signal(`USER_BROADCAST_INJECTED`);
                const box = document.getElementById('terminal-overlay-log');
                const div = document.createElement('div');
                div.className = "animate-fadeIn border-l-2 border-main/20 pl-2 bg-main/5 mb-1";
                div.innerHTML = `<span class="text-main font-bold">${this.state.pigId}:</span> <span class="text-white">${val}</span>`;
                box.prepend(div);
                document.getElementById('cmd-input').value = '';
            },
            auraPulse() {
                document.body.classList.add('spun-active');
                this.signal("AURA_PULSE_RELEASED");
                setTimeout(() => document.body.classList.remove('spun-active'), 8000);
            },
            toggleOverload() {
                this.state.isOverload = !this.state.isOverload;
                document.getElementById('primary-feed').classList.toggle('spun-active', this.state.isOverload);
                document.getElementById('btn-over').innerText = this.state.isOverload ? "TERMINATE OVERLOAD" : "Initiate Overload";
                this.signal(this.state.isOverload ? "OVERLOAD_ACTIVE" : "PHASE_LOCKED");
            },
            signal(ev) {
                const box = document.getElementById('signal-log');
                const div = document.createElement('div');
                div.className = 'p-2 bg-main/5 border-l border-main mb-1';
                div.innerHTML = `<span class="opacity-40">SIGNAL:</span> ${ev}`;
                box.prepend(div);
                if(box.children.length > 15) box.lastChild.remove();
            },
            updateClock() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('clock-display').innerText = [now.getHours(), now.getMinutes(), now.getSeconds(), Math.floor(now.getMilliseconds()/10)].map(p => String(p).padStart(2,'0')).join(':');
                }, 50);
            },
            renderWave() {
                const box = document.getElementById('wave-container');
                box.innerHTML = '';
                for(let i=0; i<30; i++) {
                    const h = Math.random() * 100;
                    const bar = document.createElement('div');
                    bar.style.height = h + '%';
                    bar.className = 'w-1 bg-main opacity-30';
                    box.appendChild(bar);
                }
            },
            renderLeaderboard() {
                const box = document.getElementById('market-leaderboard');
                box.innerHTML = this.state.leaderboard.map((p,i) => `
                    <div class="flex justify-between items-center p-2 glass-panel border-l-2 border-main/40">
                        <span class="text-[9px] mono"><span class="opacity-30">#0${i+1}</span> ${p.n}</span>
                        <span class="text-[10px] font-black text-main">$${p.t}</span>
                    </div>
                `).join('');
            },
            startSims() {
                const log = document.getElementById('terminal-overlay-log');
                setInterval(() => {
                    this.renderWave();
                    const user = this.state.namePrefixes[Math.floor(Math.random()*this.state.namePrefixes.length)] + "_" + (Math.floor(Math.random()*8999)+1000);
                    const msg = this.state.chatPool[Math.floor(Math.random()*this.state.chatPool.length)];
                    const div = document.createElement('div');
                    div.innerHTML = `<span class="text-main/60 font-bold">${user}:</span> <span class="text-gray-400">${msg}</span>`;
                    log.prepend(div);
                    if(log.children.length > 50) log.lastChild.remove();
                }, 2000);
            },
            showTribute(name) {
            document.getElementById('target-master').innerText = name ? `Tribute To: Master ${name}` : "Global Tribute Pool";
                document.getElementById('modal-container').classList.remove('hidden'); 
                document.getElementById('tribute-modal').classList.remove('hidden'); 
            },
            closeModal() { document.getElementById('modal-container').classList.add('hidden'); }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
